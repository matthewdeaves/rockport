name: Deploy

on:
  push:
    branches: [main]
    paths: ["terraform/**", "config/**", "scripts/**"]
  pull_request:
    branches: [main]
    paths: ["terraform/**", "config/**", "scripts/**"]

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14"

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 30

      - name: Comment plan on PR
        uses: actions/github-script@v8
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`.substring(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${output}\n\`\`\``
            });

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    outputs:
      tunnel_url: ${{ steps.output.outputs.tunnel_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14"

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 30

      - name: Terraform apply
        run: terraform apply tfplan
        working-directory: terraform

      - name: Get outputs
        id: output
        run: |
          URL=$(terraform output -raw tunnel_url)
          echo "tunnel_url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: terraform

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Wait for bootstrap
        run: |
          URL="${{ needs.deploy.outputs.tunnel_url }}"
          KEY=$(aws ssm get-parameter --name /rockport/master-key --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")
          echo "::add-mask::$KEY"
          echo "Waiting for instance to become healthy..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" -H "Authorization: Bearer $KEY" --max-time 5 2>/dev/null || true)
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Instance healthy after $((i * 10)) seconds"
              break
            fi
            echo "Attempt $i/30: HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

      - name: Get master key
        id: key
        run: |
          KEY=$(aws ssm get-parameter --name /rockport/master-key --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")
          echo "::add-mask::$KEY"
          echo "master_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: |
          chmod +x tests/smoke-test.sh
          ./tests/smoke-test.sh "${{ needs.deploy.outputs.tunnel_url }}" "${{ steps.key.outputs.master_key }}"
