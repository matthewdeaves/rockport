name: Deploy

on:
  push:
    branches: [main]
    paths: ["terraform/**", "config/**", "scripts/**", "sidecar/**", "tests/**"]
  pull_request:
    branches: [main]
    paths: ["terraform/**", "config/**", "scripts/**", "sidecar/**", "tests/**"]

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.14"

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 30

      - name: Comment plan on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`.substring(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${output}\n\`\`\``
            });

  deploy:
    if: false # disabled until AWS/Cloudflare secrets are configured
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    outputs:
      tunnel_url: ${{ steps.output.outputs.tunnel_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.14"

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfplan-${{ github.sha }}
          path: terraform/tfplan
          retention-days: 30

      - name: Terraform apply
        run: terraform apply tfplan
        working-directory: terraform

      - name: Get outputs
        id: output
        run: |
          URL=$(terraform output -raw tunnel_url)
          echo "tunnel_url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: terraform

  smoke-test:
    if: false # disabled until AWS/Cloudflare secrets are configured
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.14"

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Get credentials
        id: creds
        working-directory: terraform
        run: |
          KEY=$(aws ssm get-parameter --name /rockport/master-key --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")
          echo "::add-mask::$KEY"
          echo "master_key=$KEY" >> "$GITHUB_OUTPUT"
          CF_ID=$(terraform output -raw cf_access_client_id 2>/dev/null || true)
          CF_SECRET=$(terraform output -raw cf_access_client_secret 2>/dev/null || true)
          if [[ -n "$CF_SECRET" ]]; then echo "::add-mask::$CF_SECRET"; fi
          echo "cf_client_id=$CF_ID" >> "$GITHUB_OUTPUT"
          echo "cf_client_secret=$CF_SECRET" >> "$GITHUB_OUTPUT"

      - name: Wait for bootstrap
        run: |
          URL="${{ needs.deploy.outputs.tunnel_url }}"
          CF_ARGS=()
          if [[ -n "${{ steps.creds.outputs.cf_client_id }}" ]]; then
            CF_ARGS=(-H "CF-Access-Client-Id: ${{ steps.creds.outputs.cf_client_id }}" -H "CF-Access-Client-Secret: ${{ steps.creds.outputs.cf_client_secret }}")
          fi
          echo "Waiting for instance to become healthy..."
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" -H "Authorization: Bearer ${{ steps.creds.outputs.master_key }}" "${CF_ARGS[@]+"${CF_ARGS[@]}"}" --max-time 5 2>/dev/null || true)
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Instance healthy after $((i * 10)) seconds"
              break
            fi
            echo "Attempt $i/20: HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

      - name: Run smoke tests
        run: |
          chmod +x tests/smoke-test.sh
          ./tests/smoke-test.sh "${{ needs.deploy.outputs.tunnel_url }}" "${{ steps.creds.outputs.cf_client_id }}" "${{ steps.creds.outputs.cf_client_secret }}"
