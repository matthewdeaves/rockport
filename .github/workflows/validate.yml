name: Validate

on:
  push:
    branches: [main]
    paths: ["terraform/**", "config/**", "scripts/**", "sidecar/**", "tests/**", ".github/workflows/validate.yml", ".checkov.yaml", ".trivyignore", ".gitleaks.toml"]
  pull_request:
    branches: [main]
    paths: ["terraform/**", "config/**", "scripts/**", "sidecar/**", "tests/**", ".github/workflows/validate.yml", ".checkov.yaml", ".trivyignore", ".gitleaks.toml"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.14"

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform

      - name: ShellCheck
        run: shellcheck scripts/*.sh tests/*.sh

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: terraform/
          exit-code: 1
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: pip-audit sidecar dependencies
        run: |
          pip install pip-audit==2.10.0
          cp sidecar/requirements.lock /tmp/requirements-audit.txt
          pip-audit -r /tmp/requirements-audit.txt

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e # v12
        with:
          directory: terraform/
          config_file: .checkov.yaml
          output_format: cli
