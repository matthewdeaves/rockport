# Rockport Checkov config — skip checks for intentional architecture decisions
# Review periodically to ensure these are still valid

framework: terraform

skip-check:
  # --- Lambda idle-shutdown: lightweight 5-min cron, not a production service ---
  # Env vars are instance ID + timeout integer, not secrets
  - CKV_AWS_173  # Lambda env var KMS encryption
  # Only calls public AWS APIs (EC2, CloudWatch) — VPC would require NAT Gateway (~$32/mo)
  - CKV_AWS_117  # Lambda in VPC
  # Code is inline in .tf file — no supply chain risk to validate
  - CKV_AWS_272  # Lambda code signing
  # Single function, <1s runtime, 2 API calls — X-Ray adds cost for no debugging value
  - CKV_AWS_50   # Lambda X-Ray tracing
  # EventBridge retries on failure; non-critical function, next 5-min run self-heals
  - CKV_AWS_116  # Lambda DLQ

  # --- CloudWatch logs for idle-shutdown Lambda ---
  # Logs contain "Idle: X bytes" / "Active: X bytes" — no sensitive data, no compliance reqs
  - CKV_AWS_338  # CloudWatch log group 1-year retention (30 days is set)
  # Already encrypted with AWS-managed key; CMK adds $1/mo for non-sensitive logs
  - CKV_AWS_158  # CloudWatch log group KMS encryption

  # --- IAM ---
  # ec2:DescribeInstances and cloudwatch:GetMetricStatistics require Resource: "*"
  # (AWS does not support resource-level permissions for these actions).
  # aws-marketplace:ViewSubscriptions also requires wildcard.
  - CKV_AWS_355  # IAM wildcard resource (required for describe/list actions)

  # Triggered by EventBridge (max 1 every 5 min); concurrency limit adds no value
  - CKV_AWS_115  # Lambda concurrent execution limit

  # --- EC2 ---
  # 5-min metric granularity sufficient; idle checker looks at 30-min windows
  - CKV_AWS_126  # detailed monitoring (~$2/mo for no value)

  # --- SSM ---
  # SecureString encrypted with AWS-managed aws/ssm key; CMK adds $1/mo
  - CKV_AWS_337  # SSM parameter KMS CMK

  # --- S3 video bucket ---
  # Temporary video output (7-day lifecycle); versioning adds storage cost for no value
  - CKV_AWS_21   # S3 bucket versioning (video files are ephemeral, 7-day lifecycle)
  # SSE-S3 (AES-256) is configured; CMK adds $1/mo for transient video data
  - CKV_AWS_145  # S3 bucket KMS encryption (SSE-S3 is sufficient)
  # Bucket only accessed by EC2 instance role via presigned URLs; access logging adds cost
  - CKV_AWS_18   # S3 bucket access logging (low-traffic, internal-only bucket)
  # Ephemeral video data (7-day lifecycle) — replication adds cost for throwaway content
  - CKV_AWS_144  # S3 cross-region replication (not needed for 7-day ephemeral data)
  # No downstream consumers need event notifications; bucket is polled by the sidecar
  - CKV2_AWS_62  # S3 event notifications (no consumers for video output events)

  # --- CloudTrail: single-account, cost-optimized audit trail ---
  # Single-account, single-region setup — no alerting pipeline to notify via SNS
  - CKV_AWS_252  # CloudTrail SNS topic (no consumers, logs are in S3 for post-incident review)
  # SSE-S3 (AES-256) already applied via bucket encryption config; CMK adds $1/mo
  - CKV_AWS_35   # CloudTrail KMS CMK encryption (SSE-S3 is sufficient for audit logs)
  # Intentionally single-region — all infra is in eu-west-2, IAM events covered by include_global_service_events
  - CKV_AWS_67   # CloudTrail multi-region (single-region by design)
  # Audit logs stored in S3 with 90-day lifecycle; no real-time analysis pipeline needed
  - CKV2_AWS_10  # CloudTrail CloudWatch Logs integration (S3 is sufficient for this use case)
