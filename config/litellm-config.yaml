general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  max_budget: 10
  budget_duration: 1d

litellm_settings:
  drop_params: true
  modify_params: true
  disable_admin_ui: true
  default_max_internal_user_budget: 5
  default_internal_user_budget_duration: 1d

# Rate limits per key (requests/tokens per minute)
default_key_generate_params:
  rpm_limit: 60
  tpm_limit: 200000

# Optional Bedrock Guardrails — uncomment and set guardrailIdentifier from
# terraform output (enable_guardrails = true) to activate content filtering.
# Modes: pre_call (block before LLM, cheapest), during_call (parallel),
# post_call (check response after LLM).
# guardrails:
#   - guardrail_name: "rockport-guard"
#     litellm_params:
#       guardrail: bedrock
#       mode: "pre_call"
#       guardrailIdentifier: "<guardrail-id-from-terraform-output>"
#       guardrailVersion: "DRAFT"
#       aws_region_name: eu-west-2
#       default_on: false
#       mask_request_content: true
#       mask_response_content: true
