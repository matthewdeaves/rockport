[extend]
useDefault = true

[[allowlists]]
description = "Pentest test strings — intentionally invalid credentials used for auth testing"
regexTarget = "secret"
regexes = [
  '''^invalid-secret-\d+$''',
  '''^invalid-id-\d+$''',
  '''^test-not-real$''',
  '''^test-not-real-id$''',
  '''^test-not-a-key$''',
  '''^sk-your-key$''',
  '''^sk-invalid-key-12345$''',
  '''^sk-not-a-real-key$''',
  '''^dGhlIHNhbXBsZSBub25jZQ==$''',
]
