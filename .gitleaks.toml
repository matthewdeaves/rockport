[extend]
useDefault = true

[[allowlists]]
description = "False positives — placeholder and intentionally-invalid keys in docs and tests"
stopwords = [
  "sk-your-key",
  "sk-invalid-key-12345",
]

[[allowlists]]
description = "Smoke test curl auth header with intentionally-invalid key (not a real secret)"
regexTarget = "match"
regexes = ['''Bearer sk-invalid-key-12345''']
