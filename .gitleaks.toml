[extend]
useDefault = true

[[allowlists]]
description = "False positives — placeholder and intentionally-invalid keys in docs and tests"
stopwords = [
  "sk-your-key",
  "sk-invalid-key-12345",
]

[[allowlists]]
description = "Smoke test curl auth headers use shell variables, not real secrets"
regexTarget = "match"
regexes = ['''\$VALID_KEY''']
